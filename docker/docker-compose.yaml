services:
  mariadb:
    image: mariadb:jammy
    container_name: chattrix-mariadb
    restart: always

    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}

    ports:
      - "${MARIADB_PORT}:3306"

    volumes:
      - chattrix-mariadb-data:/var/lib/mysql
      - ./mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: chattrix-phpmyadmin
    restart: always

    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: ${MARIADB_ROOT_PASSWORD}

    ports:
      - "${PHPMYADMIN_PORT}:80"

    depends_on:
      - mariadb


  mongodb:
    image: mongo:7
    container_name: chattrix-mongodb
    restart: always

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}

    ports:
      - "${MONGODB_PORT}:27017"

    volumes:
      - chattrix-mongo-data:/data/db


  mongo-express:
    image: mongo-express
    container_name: chattrix-mongo-express
    restart: always

    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongodb

    ports:
      - "${MONGO_EXPRESS_PORT}:8081"

    depends_on:
      - mongodb

  rabbitmq:
    image: rabbitmq:3-management
    container_name: chattrix-rabbitmq
    restart: always

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_UI_PORT}:15672"

  redis:
    image: redis:7
    container_name: chattrix-redis
    restart: always

    command: redis-server --requirepass ${REDIS_PASSWORD}

    ports:
      - "${REDIS_PORT}:6379"

    volumes:
      - chattrix-redis-data:/data

volumes:
  chattrix-mariadb-data:
  chattrix-mongo-data:
  chattrix-redis-data: